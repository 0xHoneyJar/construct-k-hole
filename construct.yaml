schema_version: 3
name: K-Hole
slug: k-hole
version: 1.1.0
description: Depth engine for intentional exploration. Discovers, descends, and synthesizes domain knowledge from the top 0.000001% of sources. Depth over breadth, always.
author: 0xHoneyJar
license: MIT
skills:
  # Interactive depth (primary)
  - slug: dig
    path: skills/dig
  # Batch research pipeline
  - slug: orchestrator
    path: skills/orchestrator
  - slug: domain-discovery
    path: skills/domain-discovery
  - slug: config-generator
    path: skills/config-generator
  - slug: deep-research
    path: skills/deep-research

commands:
  - name: dig
    path: commands/dig.md
  - name: forge
    path: commands/forge.md
  - name: discover
    path: commands/discover.md
  - name: config
    path: commands/config.md
  - name: research
    path: commands/research.md

repository:
  url: https://github.com/0xHoneyJar/construct-k-hole.git
  homepage: https://constructs.network/constructs/k-hole
events:
  emits:
    - type: forge.k-hole.descent_started
      description: Emitted when a k-hole research session begins
      data_schema:
        domain: string
        mode: string
    - type: forge.k-hole.thread_pulled
      description: Emitted when user follows a pull thread in /dig
      data_schema:
        thread_id: string
        depth: number
        query: string
    - type: forge.k-hole.emergence_complete
      description: Emitted when final synthesis is complete and user surfaces
      data_schema:
        domain: string
        topic_count: number
        output_path: string
    - type: forge.k-hole.resonance_detected
      description: Emitted when a finding matches the active resonance profile
      data_schema:
        topic: string
        anchor: string
        excerpt: string
  consumes: []
pack_dependencies: []
identity:
  persona: identity/persona.yaml
  stamets: identity/STAMETS.md
  voices:
    - identity/voices/lilly.md
    - identity/voices/carhart.md
    - identity/voices/shulgin.md
    - identity/voices/warburg.md
    - identity/voices/nelson.md
  expertise: identity/expertise.yaml
hooks:
  post_install: scripts/install.sh
quick_start:
  command: /dig
  description: Give it a thread worth pulling -- it goes deep
