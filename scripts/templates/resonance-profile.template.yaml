# Resonance Profile
#
# This is your k-hole fingerprint. It tells the construct what you're
# drawn to — what creates gravitational pull toward depth for you
# specifically. Findings that connect to these anchors get surfaced
# prominently in every synthesis.
#
# This isn't a config file. It's a self-portrait.
# Fill it in before you dig anything meaningful.
# It's fifteen minutes that changes what you find.
#
# Place as resonance-profile.yaml in the project root or scripts/ directory.

# Keywords that resonate with your aesthetic sensibility
# These are phrases, not tags. The specificity matters.
keywords:
  - loneliness as design
  - collective consequence
  - phosphor decay
  - spatial memory

# Reference works that anchor your taste
# Not "things you like" — things that changed how you see.
references:
  - Dark Souls
  - Neuromancer
  - Wabi-sabi

# Domain touchstones — concepts you keep returning to
# The ones you can't stop thinking about across projects.
touchstones:
  - game mechanics as emotional language
  - decay and impermanence in interfaces
  - constraint as creative catalyst

# Free-form aesthetic description
# Write like you're describing the thing you're always looking for
# but can never fully name.
aesthetic: Minimalist, melancholic, systems-driven. Interested in how designed systems create emergent emotional experiences.
