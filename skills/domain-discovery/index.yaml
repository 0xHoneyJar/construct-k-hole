slug: domain-discovery
name: "Domain Discovery"
version: 1.0.0

description: |
  Use this skill IF user invokes `/discover` OR needs to map the research
  landscape of a broad domain before committing to deep research.

triggers:
  - "/discover"
  - "what should I research"
  - "map this domain"
  - "find the sub-topics"

capabilities:
  model_tier: opus
  danger_level: safe
  effort_hint: medium
  downgrade_allowed: false
  execution_hint: sequential
  requires:
    tool_calling: true
    native_runtime: true
    thinking_traces: false
    vision: false
